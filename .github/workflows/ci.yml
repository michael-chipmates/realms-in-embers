name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests (incl. rules-version canary)
        run: npm test
      - name: Sim smoke — AI-vs-AI games with invariants
        run: npx tsx src/sim/harness.ts --games 10
      - name: Production build
        run: npm run build
