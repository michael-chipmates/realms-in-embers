name: Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Build (first pass, to serve for the Codex export)
        run: npm run build
      - name: Start preview server
        run: |
          npx vite preview --port 5199 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5199/ >/dev/null && break
            sleep 1
          done
          curl -sf http://localhost:5199/ >/dev/null
      - name: Regenerate the Codex export
        run: node scripts/export-codex.mjs http://localhost:5199
      - name: Rebuild with the fresh Codex pages
        run: npm run build
      # The deploy is OPTIONAL until the Cloudflare secrets exist: a missing
      # credential is a known, documented state, not a failure — the tag is
      # still built and fully verified above, and a red X on every release
      # would cry wolf. The check step decides; the deploy and smoke steps
      # obey. Once the secrets land, a real deploy error fails loudly again.
      - name: Check for the Cloudflare secrets
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets present: CI will deploy this tag."
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy skipped (build verified)::The CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID repository secrets are not configured, so CI built and verified this tag but did not publish it. Releases are deployed from a maintainer's workstation until the secrets land (Settings → Secrets and variables → Actions)."
            {
              echo "## Deploy skipped — build verified ✅"
              echo ""
              echo "The Cloudflare secrets are not configured in this repository, so CI did not publish this tag."
              echo "The build, Codex export, and all checks above succeeded. Releases are currently deployed"
              echo "from a maintainer's workstation; add \`CLOUDFLARE_API_TOKEN\` and \`CLOUDFLARE_ACCOUNT_ID\`"
              echo "under **Settings → Secrets and variables → Actions** to let CI take over."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Deploy to Cloudflare Pages
        if: steps.creds.outputs.have == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name realms-in-embers
      - name: Post-deploy smoke against rie.gg
        if: steps.creds.outputs.have == 'true'
        run: |
          set -euo pipefail
          # give the edge a moment; retry the landing page up to 10 times
          for i in $(seq 1 10); do
            if curl -fsS https://rie.gg/ | grep -q "free browser fantasy strategy game"; then
              break
            fi
            if [ "$i" = "10" ]; then
              echo "FATAL: landing page missing its crawlable copy" >&2
              exit 1
            fi
            sleep 6
          done
          curl -fsS -o /dev/null https://rie.gg/robots.txt
          curl -fsS -o /dev/null https://rie.gg/sitemap.xml
          curl -fsS -o /dev/null https://rie.gg/codex/
          echo "smoke passed: landing copy, robots.txt, sitemap.xml, codex index"
